<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Südame leht</title>
  <meta name="description" content="Animatsiooniga südamekujuline leht, mille keskele saab lisada teksti." />
  <style>
    :root {
      --bg: #050509;
      --text: #fff7fb;
      --muted: rgba(255, 247, 251, 0.82);
      --accent: #ff4fa3;
      --accent-soft: rgba(255, 79, 163, 0.16);
      --max-text-width: min(58vw, 560px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .overlay {
      position: relative;
      z-index: 2;
      width: min(92vw, 980px);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 36px);
      pointer-events: none;
    }

    .content {
      width: min(var(--max-text-width), 88vw);
      text-align: center;
      pointer-events: auto;
      padding: clamp(16px, 3vw, 28px);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    p {
      margin: 0 auto;
      max-width: 34ch;
      font-size: clamp(14px, 2.2vw, 19px);
      line-height: 1.65;
      color: var(--muted);
      text-wrap: pretty;
    }

    .small {
      margin-top: 14px;
      font-size: clamp(12px, 1.8vw, 14px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 247, 251, 0.66);
    }

    .actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      text-decoration: none;
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.24);
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(255,79,163,1), rgba(255,113,189,1));
      border-color: transparent;
      color: #14040d;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(900px 520px at 50% 45%, rgba(255,79,163,0.10), transparent 60%),
        radial-gradient(1200px 800px at 50% 55%, rgba(0,0,0,0), rgba(0,0,0,0.58));
      mix-blend-mode: screen;
    }

    /* Telefoni jaoks natuke kitsam tekstikast */
    @media (max-width: 640px) {
      :root {
        --max-text-width: 82vw;
      }
      .content {
        border-radius: 20px;
      }
      .actions {
        gap: 10px;
      }
      .btn {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main class="overlay">
    <section class="content">
      <!-- Muuda siit enda tekst -->
      <div class="small">Sinu tekst südame sees</div>
      <h1>Kirjuta siia pealkiri</h1>
      <p>
        See ala on tehtud nii, et seda oleks telefonis ja arvutis mugav lugeda.
        Muuda see tekst enda soovitud sõnumiks, kirjelduseks või tervituseks.
      </p>

      <div class="actions">
        <a class="btn primary" href="#">Esimene nupp</a>
        <a class="btn" href="#">Teine nupp</a>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    function resize() {
      canvas.width = Math.floor(window.innerWidth * DPR);
      canvas.height = Math.floor(window.innerHeight * DPR);
    }
    window.addEventListener('resize', resize);
    resize();

    function heartPoint(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      return { x, y };
    }

    function drawMiniHeart(x, y, s, rot, color, glow) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.shadowColor = glow;
      ctx.shadowBlur = 14 * DPR;
      ctx.fillStyle = color;

      ctx.beginPath();
      ctx.moveTo(0, -0.35 * s);
      ctx.bezierCurveTo(0.55 * s, -0.95 * s, 1.35 * s, -0.15 * s, 0, 0.95 * s);
      ctx.bezierCurveTo(-1.35 * s, -0.15 * s, -0.55 * s, -0.95 * s, 0, -0.35 * s);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function screenPoint(wx, wy, scale, cx, cy) {
      return { x: cx + wx * scale, y: cy - wy * scale };
    }

    const particles = [];
    const outlineSeeds = [];

    function rebuildSeeds() {
      outlineSeeds.length = 0;
      for (let i = 0; i < 420; i++) {
        const t = (i / 420) * Math.PI * 2;
        outlineSeeds.push({ t, wobble: Math.random() * 0.045 - 0.0225 });
      }
    }
    rebuildSeeds();

    function spawnParticle() {
      const w = canvas.width;
      const h = canvas.height;
      const smaller = Math.min(w, h) / DPR;
      const scale = (smaller < 700 ? smaller * 0.018 : smaller * 0.021) * DPR;
      const cx = w * 0.5;
      const cy = h * (smaller < 700 ? 0.5 : 0.48);

      const seed = outlineSeeds[(Math.random() * outlineSeeds.length) | 0];
      const p = heartPoint(seed.t);
      const factor = 1 + seed.wobble + (Math.random() * 0.015 - 0.0075);
      const point = screenPoint(p.x * factor, p.y * factor, scale, cx, cy);

      const drift = smaller < 700 ? 7 : 10;
      particles.push({
        x: point.x + (Math.random() * drift - drift / 2) * DPR,
        y: point.y + (Math.random() * drift - drift / 2) * DPR,
        tx: point.x,
        ty: point.y,
        vx: (Math.random() * 0.5 - 0.25) * DPR,
        vy: (Math.random() * 0.5 - 0.25) * DPR,
        a: 0.5 + Math.random() * 0.5,
        size: (smaller < 700 ? 5.5 : 7.5) * DPR + Math.random() * 5 * DPR,
        rot: Math.random() * 1.4 - 0.7,
        vr: Math.random() * 0.03 - 0.015,
        life: 120 + Math.random() * 150,
        hue: 324 + Math.random() * 18,
        sat: 82 + Math.random() * 14,
        lum: 58 + Math.random() * 12
      });

      if (particles.length > 900) particles.shift();
    }

    let tick = 0;

    function frame() {
      tick += 1;
      const w = canvas.width;
      const h = canvas.height;
      ctx.fillStyle = 'rgba(5, 5, 9, 0.24)';
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 9; i++) spawnParticle();

      const pulse = 1 + Math.sin(tick * 0.045) * 0.014;

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const dx = p.tx - p.x;
        const dy = p.ty - p.y;

        p.vx += dx * 0.0009;
        p.vy += dy * 0.0009;
        p.vy += (-0.010 * DPR);
        p.vx += Math.sin((tick + i) * 0.018) * 0.003 * DPR;

        p.x += p.vx * pulse;
        p.y += p.vy * pulse;
        p.rot += p.vr;
        p.life -= 1;
        p.a *= 0.995;

        const alpha = Math.max(0, Math.min(1, p.a));
        const color = `hsla(${p.hue}, ${p.sat}%, ${p.lum}%, ${alpha})`;
        const glow = `hsla(${p.hue}, 100%, 68%, ${alpha})`;
        let size = p.size;
        if (Math.random() < 0.018) size *= 1.28;

        drawMiniHeart(p.x, p.y, size, p.rot, color, glow);

        if (p.life <= 0 || alpha < 0.02) particles.splice(i, 1);
      }

      // Keskele pehme kuma, aga mitte liiga tugev, et tekst loetav jääks
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const grad = ctx.createRadialGradient(w * 0.5, h * 0.48, 12 * DPR, w * 0.5, h * 0.48, Math.min(w, h) * 0.26);
      grad.addColorStop(0, 'rgba(255, 79, 163, 0.03)');
      grad.addColorStop(1, 'rgba(255, 79, 163, 0.0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      requestAnimationFrame(frame);
    }

    ctx.fillStyle = '#050509';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    frame();
  </script>
</body>
</html>
